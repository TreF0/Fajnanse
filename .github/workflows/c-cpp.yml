name: C/C++ CI

on:
  workflow_dispatch:
  push:
    branches: [ "main", "development" ]
  pull_request:
    branches: [ "main", "development" ]

jobs:
  # use docker image from .devcontainer/Dockerfile
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Build and test
        run: |
          export DEBIAN_FRONTEND=noninteractive
          apt-get -y update
          apt-get -y upgrade
          apt-get -y install --no-install-recommends \
            libfreetype6-dev \
            libsfml-dev \
            libxrandr-dev \
            libxcursor-dev \
            libudev-dev \
            libopenal-dev \
            libfreetype-dev \
            libflac-dev \
            libvorbis-dev \
            libopenal-dev \
            libgl1-mesa-dev \
            libegl1-mesa-dev \
            libdrm-dev \
            libgbm-dev \
            libasound2-dev \
            libopencv-dev \
            xauth \
            x11-apps \
            x11-utils \
            tesseract-ocr \
            libtesseract-dev \
            && rm -rf /var/lib/apt/lists/*
          /usr/local/bin/cmake --build /workspaces/fajnanse/build --config Debug --target all
